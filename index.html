<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Shop Premium</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#fff5f8,#ffe3ec);
}

header{
background:linear-gradient(135deg,#ff4d88,#ff77aa);
color:white;
padding:25px;
text-align:center;
font-size:24px;
font-weight:bold;
}

#products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:15px;
padding:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:10px;
height:170px;
object-fit:cover;
}

button{
background:#ff4d88;
color:white;
border:none;
padding:10px;
margin:5px;
border-radius:10px;
cursor:pointer;
}

#cart{
position:fixed;
right:10px;
top:80px;
width:250px;
background:white;
padding:10px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

#total{
color:#ff4d88;
font-size:18px;
font-weight:bold;
}

.review{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>🌸 Flower Shop Premium</header>

<!-- ➕ ADD PRODUCT -->
<div style="padding:10px;background:white;margin:10px;border-radius:10px">
<h3>➕ Добавить товар</h3>
<input id="name" placeholder="Название">
<input id="desc" placeholder="Описание">
<input id="price" placeholder="Цена ₽">
<input id="img" placeholder="Фото URL">
<button onclick="addProduct()">Добавить</button>
</div>

<!-- 🛍 PRODUCTS -->
<div id="products"></div>

<!-- 🛒 CART -->
<div id="cart">
<h3>🛒 Корзина</h3>
<div id="cartItems"></div>
<p>Итого: <span id="total">0</span> ₽</p>

<button onclick="orderWhatsApp()">💬 WhatsApp заказ</button>
</div>

<!-- 💬 REVIEWS -->
<div style="padding:20px">
<h2 style="text-align:center;color:#ff4d88">💬 Отзывы</h2>

<div class="review">🌸 Отличный магазин — Алина</div>
<div class="review">💐 Очень быстро — Мария</div>
<div class="review">🎁 Всё красиво — Иван</div>
</div>

<script>

/* 🌸 PRODUCTS (букеты + игрушки + шары + сладости) */
let products = JSON.parse(localStorage.getItem("products")) || [
{name:"Розы",desc:"Красивый букет роз",price:2500,img:"https://images.unsplash.com/photo-1501004318641-b39e6451bec6"},
{name:"Мишка",desc:"Мягкая игрушка",price:1800,img:"https://images.unsplash.com/photo-1583337130417-3346a1be7dee"},
{name:"Шары с надписью",desc:"Гелевые шары",price:1200,img:"https://images.unsplash.com/photo-1520975922284-7c2f1c1a8d63"},
{name:"Клубника в шоколаде",desc:"Сладкий подарок",price:2200,img:"https://images.unsplash.com/photo-1519869325930-281384150729"},
{name:"Открытка",desc:"Индивидуальная записка",price:200,img:"https://images.unsplash.com/photo-1513475382585-d06e58bcb0ea"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* SAVE */
function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("cart",JSON.stringify(cart));
}

/* RENDER PRODUCTS */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

products.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">

<img src="${p.img}">

<h3 contenteditable="true" oninput="edit(${i},'name',this.innerText)">
${p.name}
</h3>

<p contenteditable="true" oninput="edit(${i},'desc',this.innerText)">
${p.desc}
</p>

<b contenteditable="true" oninput="edit(${i},'price',this.innerText)">
${p.price} ₽</b>

<br>

<button onclick="add(${i})">В корзину</button>
<button onclick="del(${i})">Удалить</button>

</div>
`;
});

renderCart();
}

/* ADD */
function add(i){
cart.push(products[i]);
save();
renderCart();
}

/* CART */
function renderCart(){
let box=document.getElementById("cartItems");
box.innerHTML="";
let total=0;

cart.forEach(p=>{
box.innerHTML+=`<div>${p.name} - ${p.price}₽</div>`;
total+=Number(p.price);
});

document.getElementById("total").innerText=total;
}

/* ADD PRODUCT */
function addProduct(){
products.push({
name:name.value,
desc:desc.value,
price:price.value,
img:img.value
});
save();
render();
}

/* DELETE */
function del(i){
products.splice(i,1);
save();
render();
}

/* EDIT */
function edit(i,key,val){
products[i][key]=val;
save();
}

/* WHATSAPP */
function orderWhatsApp(){

let text="🌸 Заказ:%0A";

cart.forEach(p=>{
text+=`- ${p.name} (${p.price}₽)%0A`;
});

let total=cart.reduce((s,p)=>s+Number(p.price),0);

text+=`%0AИтого: ${total}₽`;

window.open("https://wa.me/79280126881?text="+text,"_blank");
}

render();

</script>

</body>
</html>
