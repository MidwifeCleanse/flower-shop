<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FLOWER LUXE</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<header>

<div class="logo">
FLOWER LUXE
</div>

<div class="header-right">

<select id="citySelect">
<option>Москва</option>
<option>Санкт-Петербург</option>
<option>Краснодар</option>
<option>Ростов-на-Дону</option>
<option>Сочи</option>
</select>

<button onclick="toggleCart()" class="cartBtn">
🛒 Корзина
</button>

</div>

</header>


<section class="hero">

<div class="hero-content">

<h1>
Авторские букеты премиум класса
</h1>

<p>
Доставка цветов и подарков
</p>

<button onclick="scrollToCatalog()">
Смотреть каталог
</button>

</div>

</section>


<nav>

<button onclick="showSection('bouquets')">
🌹 Букеты
</button>

<button onclick="showSection('strawberry')">
🍓 Клубника
</button>

<button onclick="showSection('toys')">
🧸 Игрушки
</button>

<button onclick="showSection('balloons')">
🎈 Шары
</button>

<button onclick="showSection('cards')">
💌 Открытки
</button>

</nav>


<section id="catalog">

<h2>🌹 Каталог букетов</h2>

<div class="products" id="bouquets">

</div>

</section>


<section>

<h2>🍓 Клубника в шоколаде</h2>

<div class="products" id="strawberry">

</div>

</section>


<section>

<h2>🧸 Мягкие игрушки</h2>

<div class="products" id="toys">

</div>

</section>


<section>

<h2>🎈 Гелиевые шары</h2>

<div class="products" id="balloons">

</div>

</section>


<section>

<h2>💌 Открытки</h2>

<div class="products" id="cards">

</div>

</section>


<section class="reviews">

<h2>
⭐ Отзывы клиентов
</h2>

<div id="reviews">

</div>

</section>


<footer>

<h3>
FLOWER LUXE
</h3>

<p>
WhatsApp: +7 (928) 012-68-81
</p>

<p>
Работаем ежедневно
</p>

</footer>


<!-- КОРЗИНА -->

<div class="cart" id="cart">

<h2>
🛒 Корзина
</h2>

<div id="cartItems">

</div>

<div id="total">
0 ₽
</div>

<button onclick="orderWhatsApp()">
Заказать через WhatsApp
</button>

</div>


<!-- СКРЫТАЯ АДМИНКА -->

<div id="adminPanel">

<h2>
Панель администратора
</h2>

<input id="adminPassword" type="password" placeholder="Пароль">

<button onclick="loginAdmin()">
Войти
</button>

<div id="adminContent">

</div>

</div>


<script src="script.js"></script>

</body>
</html>
